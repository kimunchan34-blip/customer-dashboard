<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우하하 고객 관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2433;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #7c5df5;
    --green: #2ecc8a;
    --yellow: #f5c842;
    --red: #f56b6b;
    --text: #e8ecf5;
    --text2: #8893aa;
    --text3: #4a5568;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed; left: 0; top: 0;
    width: 220px; height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 28px 0;
    z-index: 100;
  }
  .logo {
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
  }
  .logo-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .logo h1 { font-size: 15px; font-weight: 700; color: var(--text); }
  .logo p { font-size: 11px; color: var(--text2); margin-top: 3px; }

  .nav { padding: 20px 12px; flex: 1; }
  .nav-label {
    font-size: 10px; font-weight: 500; letter-spacing: 2px;
    color: var(--text3); padding: 0 12px; margin-bottom: 8px;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 500; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(79,142,247,0.12); color: var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
  .user-chip {
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .user-info .name { font-size: 12px; font-weight: 600; }
  .user-info .role { font-size: 10px; color: var(--text2); }

  /* ── MAIN ── */
  .main {
    margin-left: 220px;
    padding: 32px 36px;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .topbar h2 { font-size: 22px; font-weight: 700; }
  .topbar p { font-size: 13px; color: var(--text2); margin-top: 3px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 600; font-family: inherit;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 14px rgba(79,142,247,0.25);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.35); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text3); }
  .btn-danger { background: rgba(245,107,107,0.12); color: var(--red); border: 1px solid rgba(245,107,107,0.25); }
  .btn-danger:hover { background: rgba(245,107,107,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ── STAT CARDS ── */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .stat-card:hover::before { opacity: 1; }
  .stat-label { font-size: 11px; color: var(--text2); letter-spacing: 0.5px; margin-bottom: 10px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 6px; }
  .stat-icon { position: absolute; right: 16px; top: 16px; font-size: 22px; opacity: 0.5; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .search-wrap {
    flex: 1; position: relative;
  }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 15px;
  }
  .search-input {
    width: 100%; padding: 10px 12px 10px 38px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); }

  .filter-select {
    padding: 10px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text2); font-size: 13px; font-family: inherit;
    outline: none; cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent); color: var(--text); }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 13px 16px; text-align: left;
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    color: var(--text2); text-transform: uppercase;
  }
  td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.12s; }
  tbody tr:hover { background: var(--surface2); }

  .customer-cell { display: flex; align-items: center; gap: 10px; }
  .c-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .c-name { font-weight: 600; font-size: 13px; }
  .c-id { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }

  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge-vip { background: rgba(245,200,66,0.12); color: var(--yellow); border: 1px solid rgba(245,200,66,0.25); }
  .badge-regular { background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
  .badge-new { background: rgba(46,204,138,0.1); color: var(--green); border: 1px solid rgba(46,204,138,0.2); }
  .badge-inactive { background: rgba(138,147,170,0.1); color: var(--text2); border: 1px solid var(--border); }

  .action-btns { display: flex; gap: 6px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text2);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 480px; max-width: 95vw;
    padding: 28px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity:0; }
    to { transform: translateY(0); opacity:1; }
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .modal-header h3 { font-size: 17px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: var(--text2);
    font-size: 20px; cursor: pointer; padding: 2px;
    line-height: 1; transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; }
  .form-input, .form-select, .form-textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit;
    font-size: 13px; padding: 10px 12px; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 72px; }
  .form-select option { background: var(--surface2); }

  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ── TOAST ── */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9999;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease;
    min-width: 240px;
  }
  @keyframes toastIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--accent); }

  /* ── PAGINATION ── */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text2);
  }
  .page-btns { display: flex; gap: 4px; }
  .page-btn {
    padding: 5px 10px; border-radius: 6px;
    background: none; border: 1px solid var(--border);
    color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .page-btn:hover, .page-btn.active { background: var(--surface2); color: var(--text); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-badge">CRM</div>
    <h1>고객 관리 시스템</h1>
    <p>Customer Management</p>
  </div>
  <nav class="nav">
    <div class="nav-label">메뉴</div>
    <div class="nav-item active">
      <span class="icon">👥</span> 고객 목록
    </div>
    <div class="nav-item" onclick="showToast('준비 중인 기능입니다', 'info')">
      <span class="icon">📊</span> 통계
    </div>
    <div class="nav-item" onclick="showToast('준비 중인 기능입니다', 'info')">
      <span class="icon">📋</span> 주문 내역
    </div>
    <div class="nav-item" onclick="showToast('준비 중인 기능입니다', 'info')">
      <span class="icon">⚙️</span> 설정
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar">A</div>
      <div class="user-info">
        <div class="name">관리자</div>
        <div class="role">Admin</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <h2>고객 목록</h2>
      <p id="subtitle">전체 고객을 관리합니다</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      ＋ 고객 추가
    </button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-label">전체 고객</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-sub">등록된 전체 고객 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⭐</div>
      <div class="stat-label">VIP 고객</div>
      <div class="stat-value" id="stat-vip">0</div>
      <div class="stat-sub">VIP 등급 고객</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🌱</div>
      <div class="stat-label">신규 고객</div>
      <div class="stat-value" id="stat-new">0</div>
      <div class="stat-sub">신규 등급 고객</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💤</div>
      <div class="stat-label">비활성 고객</div>
      <div class="stat-value" id="stat-inactive">0</div>
      <div class="stat-sub">비활성 상태 고객</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput"
        placeholder="이름, 이메일, 전화번호로 검색…"
        oninput="renderTable()">
    </div>
    <select class="filter-select" id="gradeFilter" onchange="renderTable()">
      <option value="">전체 등급</option>
      <option value="VIP">VIP</option>
      <option value="일반">일반</option>
      <option value="신규">신규</option>
      <option value="비활성">비활성</option>
    </select>
    <button class="btn btn-ghost" onclick="exportCSV()">📥 내보내기</button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>고객 정보</th>
          <th>연락처</th>
          <th>이메일</th>
          <th>등급</th>
          <th>가입일</th>
          <th>메모</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">🔍</div>
      <p>검색 결과가 없습니다</p>
    </div>
    <div class="pagination">
      <span id="pageInfo">0명의 고객</span>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">고객 추가</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input type="text" class="form-input" id="f-name" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label class="form-label">등급</label>
        <select class="form-select" id="f-grade">
          <option value="신규">신규</option>
          <option value="일반">일반</option>
          <option value="VIP">VIP</option>
          <option value="비활성">비활성</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">전화번호</label>
        <input type="text" class="form-input" id="f-phone" placeholder="010-0000-0000">
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="f-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">주소</label>
        <input type="text" class="form-input" id="f-address" placeholder="서울시 강남구…">
      </div>
      <div class="form-group">
        <label class="form-label">생년월일</label>
        <input type="date" class="form-input" id="f-birth">
      </div>
      <div class="form-group full">
        <label class="form-label">메모</label>
        <textarea class="form-textarea" id="f-memo" placeholder="고객 관련 메모를 입력하세요…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveCustomer()">저장</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ── DATA ──
const COLORS = ['#4f8ef7','#7c5df5','#2ecc8a','#f5c842','#f56b6b','#e67e22','#1abc9c','#e91e8c'];
let customers = JSON.parse(localStorage.getItem('crm_customers') || '[]');
let editingId = null;
let currentPage = 1;
const PER_PAGE = 8;

// 샘플 데이터 (처음 실행 시)
if (customers.length === 0) {
  customers = [
    { id: 'C001', name: '김민준', phone: '010-1234-5678', email: 'minjun@example.com', grade: 'VIP', address: '서울시 강남구', birth: '1990-03-15', memo: '장기 고객, 주요 거래처', createdAt: '2024-01-10' },
    { id: 'C002', name: '이서연', phone: '010-2345-6789', email: 'seoyeon@example.com', grade: '일반', address: '경기도 성남시', birth: '1995-07-22', memo: '', createdAt: '2024-02-14' },
    { id: 'C003', name: '박지호', phone: '010-3456-7890', email: 'jiho@example.com', grade: '신규', address: '인천시 연수구', birth: '2000-11-08', memo: '온라인 채널 유입', createdAt: '2025-03-01' },
    { id: 'C004', name: '최유나', phone: '010-4567-8901', email: 'yuna@example.com', grade: 'VIP', address: '서울시 서초구', birth: '1988-05-30', memo: 'B2B 계약 고객', createdAt: '2023-12-05' },
    { id: 'C005', name: '정승현', phone: '010-5678-9012', email: 'seunghyun@example.com', grade: '비활성', address: '부산시 해운대구', birth: '1992-09-18', memo: '연락 두절 상태', createdAt: '2023-06-20' },
    { id: 'C006', name: '한소희', phone: '010-6789-0123', email: 'sohee@example.com', grade: '일반', address: '대구시 수성구', birth: '1997-01-25', memo: '', createdAt: '2024-08-11' },
  ];
  save();
}

function save() {
  localStorage.setItem('crm_customers', JSON.stringify(customers));
}

function genId() {
  const max = customers.reduce((m, c) => Math.max(m, parseInt(c.id.slice(1))||0), 0);
  return 'C' + String(max + 1).padStart(3, '0');
}

function avatarColor(name) {
  let h = 0; for (let c of name) h += c.charCodeAt(0);
  return COLORS[h % COLORS.length];
}

// ── STATS ──
function updateStats() {
  document.getElementById('stat-total').textContent = customers.length;
  document.getElementById('stat-vip').textContent = customers.filter(c => c.grade === 'VIP').length;
  document.getElementById('stat-new').textContent = customers.filter(c => c.grade === '신규').length;
  document.getElementById('stat-inactive').textContent = customers.filter(c => c.grade === '비활성').length;
}

// ── TABLE ──
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const g = document.getElementById('gradeFilter').value;
  return customers.filter(c => {
    const matchQ = !q || c.name.includes(q) || c.email.toLowerCase().includes(q) || c.phone.includes(q);
    const matchG = !g || c.grade === g;
    return matchQ && matchG;
  });
}

function badgeClass(grade) {
  return { 'VIP': 'badge-vip', '일반': 'badge-regular', '신규': 'badge-new', '비활성': 'badge-inactive' }[grade] || 'badge-regular';
}

function renderTable() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;

  const slice = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  if (slice.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = slice.map(c => `
      <tr>
        <td>
          <div class="customer-cell">
            <div class="c-avatar" style="background:${avatarColor(c.name)}">${c.name[0]}</div>
            <div>
              <div class="c-name">${c.name}</div>
              <div class="c-id">${c.id}</div>
            </div>
          </div>
        </td>
        <td>${c.phone || '—'}</td>
        <td>${c.email || '—'}</td>
        <td><span class="badge ${badgeClass(c.grade)}">${c.grade}</span></td>
        <td>${c.createdAt || '—'}</td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)">${c.memo || '—'}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn-ghost btn-sm" onclick="editCustomer('${c.id}')">✏️ 수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCustomer('${c.id}')">🗑 삭제</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  document.getElementById('pageInfo').textContent = `총 ${total}명의 고객`;
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById('pageBtns');
  let html = `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage<=1?'disabled':''}>←</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>→</button>`;
  container.innerHTML = html;
}

function changePage(p) {
  const total = Math.ceil(getFiltered().length / PER_PAGE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
}

// ── MODAL ──
function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? '고객 수정' : '고객 추가';
  if (id) {
    const c = customers.find(x => x.id === id);
    if (!c) return;
    document.getElementById('f-name').value = c.name;
    document.getElementById('f-phone').value = c.phone || '';
    document.getElementById('f-email').value = c.email || '';
    document.getElementById('f-grade').value = c.grade;
    document.getElementById('f-address').value = c.address || '';
    document.getElementById('f-birth').value = c.birth || '';
    document.getElementById('f-memo').value = c.memo || '';
  } else {
    ['f-name','f-phone','f-email','f-address','f-birth','f-memo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-grade').value = '신규';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function editCustomer(id) { openModal(id); }

function saveCustomer() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('이름을 입력해주세요', 'error'); return; }

  const data = {
    name,
    phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    grade: document.getElementById('f-grade').value,
    address: document.getElementById('f-address').value.trim(),
    birth: document.getElementById('f-birth').value,
    memo: document.getElementById('f-memo').value.trim(),
  };

  if (editingId) {
    const i = customers.findIndex(c => c.id === editingId);
    customers[i] = { ...customers[i], ...data };
    showToast(`${name} 고객 정보가 수정되었습니다`, 'success');
  } else {
    customers.push({ id: genId(), createdAt: new Date().toISOString().slice(0,10), ...data });
    showToast(`${name} 고객이 추가되었습니다`, 'success');
  }

  save(); closeModal(); updateStats(); currentPage = 1; renderTable();
}

function deleteCustomer(id) {
  const c = customers.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`"${c.name}" 고객을 삭제하시겠습니까?`)) return;
  customers = customers.filter(x => x.id !== id);
  save(); showToast(`${c.name} 고객이 삭제되었습니다`, 'info');
  updateStats(); renderTable();
}

// ── EXPORT CSV ──
function exportCSV() {
  const rows = [['ID','이름','전화번호','이메일','등급','주소','생년월일','메모','가입일']];
  customers.forEach(c => rows.push([c.id, c.name, c.phone, c.email, c.grade, c.address, c.birth, c.memo, c.createdAt]));
  const csv = rows.map(r => r.map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `customers_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  showToast('CSV 파일이 다운로드됩니다', 'success');
}

// ── TOAST ──
function showToast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── INIT ──
updateStats();
renderTable();
</script>
